- op: add
  path: /spec/template/containers/0/env/-
  value:
    name: OPENAI_API_KEY
    valueFrom:
      secretKeyRef:
        name: openai-openai-api-key
        key: api-key
- op: replace
  path: /spec/model/name
  value: gpt-4o
- op: replace
  path: /spec/template/containers/0/env/3/value
  value: openai-postgres
- op: replace
  path: /spec/template/initContainers/0/env/0/value
  value: openai-postgres
