- op: add
  path: /spec/template/containers/0/env/-
  value:
    name: GEMINI_API_KEY
    valueFrom:
      secretKeyRef:
        name: gemini-gemini-api-key
        key: api-key
- op: replace
  path: /spec/model/name
  value: gemini-2.0-flash
- op: replace
  path: /spec/template/containers/0/env/3/value
  value: gemini-postgres
- op: replace
  path: /spec/template/initContainers/0/env/0/value
  value: gemini-postgres
