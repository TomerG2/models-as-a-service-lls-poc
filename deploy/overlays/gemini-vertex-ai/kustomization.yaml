apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: llm

resources:
  - ../../base

patches:
  - target:
      kind: LLMInferenceService
      name: llamastack
    path: patches/deployment-patch.yaml

namePrefix: gemini-vertex-ai-

labels:
  - pairs:
      app.kubernetes.io/instance: gemini-vertex-ai-llamastack
      provider: gemini-vertex-ai
