apiVersion: v1
kind: Secret
metadata:
  name: vertex-ai-credentials
type: Opaque
stringData:
  # IMPORTANT: Set environment variables first, then create the secret.
  #
  # Required:
  #   export VERTEX_AI_PROJECT="your-gcp-project-id"
  #   export VERTEX_AI_LOCATION="us-central1"  # or your preferred region
  #
  # Create secret with (recommended):
  #   kubectl create secret generic gemini-vertex-ai-vertex-ai-credentials \
  #     --from-literal=project="$VERTEX_AI_PROJECT" \
  #     --from-literal=location="$VERTEX_AI_LOCATION" \
  #     --from-file=service-account.json="/path/to/sa.json" \
  #     -n llm
  project: "${VERTEX_AI_PROJECT}"
  location: "${VERTEX_AI_LOCATION}"
  # service-account.json should be added via --from-file when creating the secret
