# ExternalSecret for Anthropic API key.
#
# Creates K8s Secret: anthropic-anthropic-api-key
# Consumed by:        overlays/anthropic/patches/deployment-patch.yaml
#
# Vault KV path:      secret/data/llm/anthropic  (adjust to your layout)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: anthropic-api-key
  namespace: llm
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: anthropic-anthropic-api-key
    creationPolicy: Owner
  data:
    - secretKey: api-key
      remoteRef:
        key: llm/anthropic
        property: api-key
