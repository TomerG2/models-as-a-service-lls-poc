# SecretStore -- connects External Secrets Operator to a Vault backend.
#
# This is an EXAMPLE. Adapt the Vault address, auth method, and mount path
# to match your environment.
#
# Docs: https://external-secrets.io/latest/provider/hashicorp-vault/
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: llm
spec:
  provider:
    vault:
      server: "https://vault.example.com"
      path: "secret"           # KV engine mount path
      version: "v2"            # KV version (v1 or v2)
      auth:
        # --- Kubernetes auth (recommended for in-cluster workloads) ---
        kubernetes:
          mountPath: "kubernetes"
          role: "llm-secrets-reader"
          serviceAccountRef:
            name: "default"
        # --- AppRole auth (uncomment and remove kubernetes block) ---
        # appRole:
        #   path: "approle"
        #   roleId: "my-role-id"
        #   secretRef:
        #     name: "vault-approle-secret"
        #     key: "secret-id"
        # --- Token auth (simplest, not recommended for production) ---
        # tokenSecretRef:
        #   name: "vault-token"
        #   key: "token"
